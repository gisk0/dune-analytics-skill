name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: trunk-io/trunk-action@v1
      - run: npm run typecheck
      - run: npm run test:coverage

  skillguard:
    name: SkillGuard Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gisk0/skillguard-scanner/action@main
        with:
          skill-dir: skill
